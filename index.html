<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fardos Shoots Photography</title>
    <style>
        /* Base Dark Theme Styling */
        body {
            background-color: #0b0b0b;
            color: #f0f0f0;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        header {
            text-align: center;
            padding: 80px 20px 40px 20px;
        }

        header h1 {
            font-weight: 300;
            letter-spacing: 6px;
            text-transform: uppercase;
            font-size: 2.4rem;
            margin: 0 0 14px 0;
        }

        header p {
            color: #888888;
            font-size: 0.9rem;
            letter-spacing: 3px;
            margin: 0;
            text-transform: uppercase;
        }

        /* Portfolio Sections styling */
        .category-section {
            max-width: 1400px;
            margin: 0 auto 60px auto;
            padding: 0 24px;
        }

        .category-title {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #888888;
            margin-bottom: 24px;
            border-bottom: 1px solid #1f1f1f;
            padding-bottom: 10px;
        }

        /* Responsive Grid for Images */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        .gallery-item {
            overflow: hidden;
            background-color: #121212;
            aspect-ratio: 3 / 2;
            box-shadow: 0 6px 25px rgba(0,0,0,0.45);
            border-radius: 4px;
            position: relative;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            cursor: pointer;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), filter 0.4s ease;
            filter: brightness(0.93) contrast(1.03);
        }

        .gallery-item img:hover {
            transform: scale(1.04);
            filter: brightness(1.06) contrast(1.06);
        }

        /* Fullscreen Lightbox Modal */
        .lightbox {
            display: none;
            position: fixed;
            z-index: 2000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(4, 4, 4, 0.98);
            backdrop-filter: blur(12px);
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .lightbox.active {
            display: flex;
            opacity: 1;
        }

        .lightbox-content {
            max-width: 85%;
            max-height: 85vh;
            object-fit: contain;
            box-shadow: 0 25px 60px rgba(0,0,0,0.8);
            transform: scale(0.96);
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            user-select: none;
        }

        .lightbox.active .lightbox-content {
            transform: scale(1);
        }

        .close {
            position: absolute;
            top: 30px;
            right: 40px;
            font-size: 44px;
            color: #666;
            cursor: pointer;
            transition: color 0.2s ease, transform 0.2s ease;
            user-select: none;
            z-index: 2100;
        }

        .close:hover {
            color: #ffffff;
            transform: scale(1.1);
        }

        /* Navigation Arrows */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(20, 20, 20, 0.4);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #aaa;
            font-size: 28px;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 50%;
            transition: all 0.2s ease;
            user-select: none;
            z-index: 2100;
        }

        .nav-btn:hover {
            background: rgba(40, 40, 40, 0.8);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.3);
        }

        .prev-btn { left: 40px; }
        .next-btn { right: 40px; }

        /* Mobile View Rules */
        @media (max-width: 600px) {
            .gallery {
                grid-template-columns: 1fr;
                gap: 16px;
            }
            header h1 { font-size: 1.8rem; }
            header { padding: 60px 20px 30px 20px; }
            .close { top: 20px; right: 25px; font-size: 38px; }
            .nav-btn { width: 45px; height: 45px; font-size: 20px; }
            .prev-btn { left: 15px; }
            .next-btn { right: 15px; }
            .lightbox-content { max-width: 90%; }
        }
    </style>
</head>

    <!-- Lightbox Structural Overlay -->
    <div id="lightbox" class="lightbox">
        <span class="close" id="close-btn">&times;</span>
        <div class="nav-btn prev-btn" id="prev-btn">&#10094;</div>
        <img class="lightbox-content" id="full-img" src="" alt="Enlarged gallery view">
        <div class="nav-btn next-btn" id="next-btn">&#10095;</div>
    </div>

    <script>
        const portfolioContainer = document.getElementById('portfolio-container');
        const lightbox = document.getElementById('lightbox');
        const fullImg = document.getElementById('full-img');
        const closeBtn = document.getElementById('close-btn');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');

        let allImages = [];
        let currentIndex = -1;

        const updateImagesArray = () => {
            allImages = Array.from(portfolioContainer.querySelectorAll('.gallery-item img'));
        };

        const showImage = (index) => {
            if (index < 0) index = allImages.length - 1; 
            if (index >= allImages.length) index = 0;    
            
            currentIndex = index;
            const targetImg = allImages[currentIndex];
            fullImg.src = targetImg.src;
            fullImg.alt = targetImg.alt;
        };

        portfolioContainer.addEventListener('click', (e) => {
            if (e.target.tagName === 'IMG') {
                updateImagesArray();
                const index = allImages.indexOf(e.target);
                lightbox.classList.add('active');
                document.body.style.overflow = 'hidden'; 
                showImage(index);
            }
        });

        const closeLightbox = () => {
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
            setTimeout(() => { fullImg.src = ''; }, 300);
        };

        closeBtn.addEventListener('click', closeLightbox);
        prevBtn.addEventListener('click', (e) => { e.stopPropagation(); showImage(currentIndex - 1); });
        nextBtn.addEventListener('click', (e) => { e.stopPropagation(); showImage(currentIndex + 1); });
        
        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) {
                closeLightbox();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (!lightbox.classList.contains('active')) return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowRight') showImage(currentIndex + 1);
            if (e.key === 'ArrowLeft') showImage(currentIndex - 1);
        });
    </script>
