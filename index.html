    <style>
        /* Base Dark Theme Styling */
        body {
            background-color: #0b0b0b;
            color: #f0f0f0;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        header {
            text-align: center;
            padding: 80px 20px 50px 20px;
        }

        header h1 {
            font-weight: 300;
            letter-spacing: 6px;
            text-transform: uppercase;
            font-size: 2.4rem;
            margin: 0 0 14px 0;
        }

        header p {
            color: #888888;
            font-size: 0.9rem;
            letter-spacing: 3px;
            margin: 0;
            text-transform: uppercase;
        }

        /* Responsive Flow Grid Layout */
        .gallery-container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 24px 100px 24px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .gallery-item {
            overflow: hidden;
            background-color: #121212;
            aspect-ratio: 3 / 2;
            box-shadow: 0 4px 25px rgba(0,0,0,0.5);
            border-radius: 4px;
            position: relative;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            cursor: pointer;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), filter 0.4s ease;
            filter: brightness(0.93) contrast(1.03);
        }

        .gallery-item img:hover {
            transform: scale(1.04);
            filter: brightness(1.06) contrast(1.06);
        }

        /* Fullscreen Lightbox Modal */
        .lightbox {
            display: none;
            position: fixed;
            z-index: 2000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(4, 4, 4, 0.98);
            backdrop-filter: blur(12px);
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .lightbox.active {
            display: flex;
            opacity: 1;
        }

        .lightbox-content {
            max-width: 94%;
            max-height: 88vh;
            object-fit: contain;
            box-shadow: 0 25px 60px rgba(0,0,0,0.8);
            transform: scale(0.96);
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .lightbox.active .lightbox-content {
            transform: scale(1);
        }

        .close {
            position: absolute;
            top: 30px;
            right: 40px;
            font-size: 44px;
            color: #666;
            cursor: pointer;
            transition: color 0.2s ease, transform 0.2s ease;
            user-select: none;
        }

        .close:hover {
            color: #ffffff;
            transform: scale(1.1);
        }

        /* Mobile View Rules */
        @media (max-width: 600px) {
            .gallery {
                grid-template-columns: 1fr;
                gap: 16px;
            }
            header h1 {
                font-size: 1.8rem;
            }
            header {
                padding: 60px 20px 40px 20px;
            }
            .close {
                top: 25px;
                right: 25px;
                font-size: 38px;
            }
        }
    </style>

    <!-- Lightbox Structural Overlay -->
    <div id="lightbox" class="lightbox">
        <span class="close" id="close-btn">&times;</span>
        <img class="lightbox-content" id="full-img" src="" alt="Enlarged gallery view">
    </div>

    <script>
        const gallery = document.getElementById('gallery');
        const lightbox = document.getElementById('lightbox');
        const fullImg = document.getElementById('full-img');
        const closeBtn = document.getElementById('close-btn');

        // Dynamic Lightbox Triggers across the mosaic stream
        gallery.addEventListener('click', (e) => {
            if (e.target.tagName === 'IMG') {
                fullImg.src = e.target.src;
                fullImg.alt = e.target.alt;
                lightbox.classList.add('active');
                document.body.style.overflow = 'hidden'; // Lock background scrolling
            }
        });

        const closeLightbox = () => {
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
            setTimeout(() => { fullImg.src = ''; }, 300); // Purge cache after fade transition
        };

        closeBtn.addEventListener('click', closeLightbox);
        
        // Close if backdrop overlay canvas clicked
        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) {
                closeLightbox();
            }
        });

        // Accessibility Escape Key bindings
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && lightbox.classList.contains('active')) {
                closeLightbox();
            }
        });
    </script>
